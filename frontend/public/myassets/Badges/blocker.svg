<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="hammerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>
  <polygon points="50,5 95,25 95,75 50,95 5,75 5,25" fill="#1e1e2e" stroke="url(#hammerGrad)" stroke-width="4" />
  <!-- Hammer -->
  <g transform="rotate(45 50 50)" filter="url(#shadow)">
    <rect x="45" y="40" width="10" height="40" fill="#8B4513" rx="2" />
    <path d="M30 20 h40 v20 h-40 z" fill="url(#hammerGrad)" rx="3" />
    <path d="M25 25 h5 v10 h-5 z" fill="#D1D5DB" />
    <path d="M70 25 h5 v10 h-5 z" fill="#D1D5DB" />
  </g>
  <!-- Sparkles -->
  <circle cx="25" cy="30" r="3" fill="#FFF" opacity="0.8" />
  <circle cx="75" cy="70" r="2" fill="#FFF" opacity="0.6" />
</svg>
